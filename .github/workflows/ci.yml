name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (sdd MCP)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/sdd/mcp
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/sdd/mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  validate-manifests:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check manifest names for reserved terms
        run: bash scripts/validate-manifests.sh

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint markdown
        run: >
          npx --yes markdownlint-cli@0.44
          '**/*.md'
          --ignore node_modules
          --ignore plugins/sdd/mcp/dist
