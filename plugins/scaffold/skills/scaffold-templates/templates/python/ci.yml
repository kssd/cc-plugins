name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv sync --extra dev || pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check . || ruff check .

      - name: Black (check)
        run: uv run black --check . || black --check .

      - name: Tests
        run: uv run pytest -q || pytest -q
        if: hashFiles('tests/**/*.py') != ''
